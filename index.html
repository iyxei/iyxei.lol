        }

        .entry-screen.hidden-smooth {

            transform: scale(1.1);

        .pop-anim {
            opacity: 0;
            transform: translateY(20px) scale(0.95);

        .profile-card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(10, 10, 10, 0.7);

        .custom-status-card {

        .player-right {

        .track-title {

        .progress-area {

        .time-label {

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;

            background: #e74c3c;

        .controls-row {
            display: flex;

        .control-btns {

        .extra-btns i.active { color: #e74c3c; }

        .main-content {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;

    <script>
        const audio = new Audio('https://file.garden/aTZTACJbkUlB55j2/Chase%20Atlantic%20-%20HEAVEN%20AND%20BACK.mp3');
        audio.loop = false;

        function profileCard(uid) {
            return {
                entered: false,
                name: 'Loading...',
                username: 'loading',
                avatar: 'https://cdn.discordapp.com/embed/avatars/0.png',
                banner: 'https://media.discordapp.net/attachments/1413865012367327302/1422122867369181194/rarararansom.jpg?ex=6a5bd3e1&is=6a5a8261&hm=c1452df93322515a564b05dad23ef31f1a0232f8ccb2f95d423305ee9a3c7cf5&=&format=webp&width=637&height=362',
                decoration: null,
                status: 'offline',
                memberSince: 'Loading date...',
                customStatus: '',
                customStatusEmoji: '',
                isSpotify: false,
                spotify: {},
                hasActivity: false,
                activity: {},
                activityImage: null,

                enter() {
                    this.entered = true;
                    audio.play().catch(() => {});
                },

                calculateMemberSince() {
                    try {
                        const timestamp = Number((BigInt(uid) >> 22n) + 1420070400000n);
                        const date = new Date(timestamp);
                        this.memberSince = date.toLocaleDateString('en-US', {
                            month: 'short', day: '2-digit', year: 'numeric'
                        });
                    } catch (e) {
                        this.memberSince = 'Unknown Date';
                    }
                },

                async init() {
                    this.calculateMemberSince();
                    const fetchPresence = async () => {
                        try {
                            const r = await fetch(`https://api.lanyard.rest/v1/users/${uid}`);
                            const { data } = await r.json();
                            const user = data.discord_user;
                            this.name = user.global_name || user.username;
                            this.username = user.username;
                            this.status = data.discord_status;
                            this.avatar = user.avatar
                                ? `https://cdn.discordapp.com/avatars/${uid}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=256`
                                : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator) % 5 || 0}.png`;
                            if (user.banner) {
                                this.banner = `https://cdn.discordapp.com/banners/${uid}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'png'}?size=1024`;
                            }
                            const decAsset = user.avatar_decoration_data?.asset;
                            this.decoration = decAsset ? `https://cdn.discordapp.com/avatar-decoration-presets/${decAsset}.png` : null;
                            const customAct = data.activities.find(a => a.type === 4);
                            this.customStatus = customAct ? customAct.state || '' : '';
                            this.customStatusEmoji = customAct ? customAct.emoji?.name || '' : '';
                            this.isSpotify = data.listening_to_spotify;
                            if (this.isSpotify) this.spotify = data.spotify;
                            const act = data.activities.find(a => a.type !== 4 && a.id !== "spotify:1");
                            this.hasActivity = !!act;
                            if (act) {
                                this.activity = act;
                                if (act.assets && act.assets.large_image) {
                                    let img = act.assets.large_image;
                                    this.activityImage = img.startsWith("mp:external/")
                                        ? `https://media.discordapp.net/external/${img.replace("mp:external/", "")}`
                                        : `https://cdn.discordapp.com/app-assets/${act.application_id}/${img}.png`;
                                } else {
                                    this.activityImage = null;
                                }
                            }
                        } catch (e) {}
                    };
                    fetchPresence();
                    setInterval(fetchPresence, 3000);
                }
            }
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('musicPlayer', () => ({
                playing: false,
                currentTime: 0,
                duration: 0,
                progress: 0,
                shuffle: false,
                repeat: false,
                liked: false,
                albumCover: getComputedStyle(document.documentElement).getPropertyValue('--player-album').trim().replace(/^url\(["']?|["']?\)$/g, ''),
                init() {
                    audio.addEventListener('loadedmetadata', () => {
                        this.duration = audio.duration;
                    });
                    audio.addEventListener('timeupdate', () => {
                        this.currentTime = audio.currentTime;
                        this.progress = (audio.currentTime / audio.duration) * 100 || 0;
                    });
                    audio.addEventListener('play', () => { this.playing = true; });
                    audio.addEventListener('pause', () => { this.playing = false; });
                    audio.addEventListener('ended', () => {
                        if (this.repeat) {
                            audio.currentTime = 0;
                            audio.play();
                        } else {
                            this.playing = false;
                        }
                    });
                    if (audio.readyState >= 1) {
                        this.duration = audio.duration;
                    }
                },
                toggle() {
                    if (audio.paused) {
                        audio.play();
                    } else {
                        audio.pause();
                    }
                },
                prev() {
                    audio.currentTime = 0;
                    if (audio.paused) audio.play();
                },
                next() {
                    audio.currentTime = 0;
                    if (audio.paused) audio.play();
                },
                seek(event) {
                    const rect = event.currentTarget.getBoundingClientRect();
                    const fraction = (event.clientX - rect.left) / rect.width;
                    if (isFinite(audio.duration)) {
                        audio.currentTime = fraction * audio.duration;
                    }
                },
                formatTime(seconds) {
                    if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
                    const m = Math.floor(seconds / 60);
                    const s = Math.floor(seconds % 60);
                    return m + ':' + (s < 10 ? '0' : '') + s;
                }
            }));
        });
    </script>
